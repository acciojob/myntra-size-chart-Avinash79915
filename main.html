<!DOCTYPE html>
<html>
<head>
    <title>Size Chart</title>
</head>
<body>

<table border="1" cellspacing="0" cellpadding="8" style="border-collapse: collapse; text-align: center; width: 60%;">
    
    <!-- Header Row -->
    <thead style="background-color: #b44a4a; color: white;">
        <tr>
            <th>Part</th>
            <th>XS</th>
            <th>S</th>
            <th>M</th>
            <th>L</th>
            <th>XL</th>
        </tr>
    </thead>

    <!-- Data Rows -->
    <tbody>
        <tr style="background-color: #d88c8c;">
            <td><b>Waist</b></td>
            <td>25</td>
            <td>28</td>
            <td>30</td>
            <td>31</td>
            <td>32</td>
        </tr>

        <tr style="background-color: #e6c6c6;">
            <td><b>Chest</b></td>
            <td>34</td>
            <td>34</td>
            <td>38</td>
            <td>40</td>
            <td>41</td>
        </tr>

        <tr style="background-color: #cccccc;">
            <td><b>Sleeve</b></td>
            <td>23</td>
            <td>24</td>
            <td>24</td>
            <td>25</td>
            <td>25</td>
        </tr>
    </tbody>

</table>

</body>
</html>
